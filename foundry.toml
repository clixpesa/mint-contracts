[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
viaIR = true


remappings = [
  '@openzeppelin/contracts=lib/openzeppelin-contracts/contracts',
  '@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts',
  '@account-abstraction/contracts=lib/account-abstraction/contracts',
  '@chainlink/contracts=lib/foundry-chainlink-toolkit',
  '@solady/contracts=lib/solady/src',
]

[rpc_endpoints]
celo-sepolia = "https://forno.celo-sepolia.celo-testnet.org/"
celo = "https://forno.celo.org"
base-sepolia = "https://sepolia.base.org"
base = "https://mainnet.base.org"

[etherscan]
celo = { key = "${ETHERSCAN_API_KEY}" }
celo-sepolia = { key = "${ETHERSCAN_API_KEY}" }
base = { key = "${ETHERSCAN_API_KEY}" }
base-sepolia = { key = "${ETHERSCAN_API_KEY}" }


[profile.default.fuzz]
runs = 1000
seed = "0x4444"

fs_permissions = [
    { access = "read", path = "./broadcast" },
    { access = "read", path = "./reports" },
]


# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
